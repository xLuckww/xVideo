name: Build Windows

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Windows WebView2
        run: |
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "$env:TEMP\MicrosoftEdgeWebview2Setup.exe"
          Start-Process -FilePath "$env:TEMP\MicrosoftEdgeWebview2Setup.exe" -ArgumentList "/silent /install" -Wait

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build Tauri app
        run: npx tauri build

      - name: List build outputs
        run: |
          dir src-tauri\target\release\bundle\msi\
          dir src-tauri\target\release\bundle\nsis\

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: xVideo-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          retention-days: 30
          if-no-files-found: warn

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: xVideo-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30
          if-no-files-found: warn
